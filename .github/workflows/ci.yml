name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  enrich-description:
    name: Enrich PR Description
    if: >-
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && github.event.label.name == 'rerun')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract task number and Jira key from branch name
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ task-([0-9]+) ]]; then
            echo "task_number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "jira_key=" >> "$GITHUB_OUTPUT"
            echo "source=tasks" >> "$GITHUB_OUTPUT"
            echo "Found task number: ${BASH_REMATCH[1]} in branch: $BRANCH"
          elif [[ "$BRANCH" =~ ([A-Z][A-Z0-9]*-[0-9]+) ]]; then
            echo "task_number=" >> "$GITHUB_OUTPUT"
            echo "jira_key=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "source=jira" >> "$GITHUB_OUTPUT"
            echo "Found Jira key: ${BASH_REMATCH[1]} in branch: $BRANCH"
          else
            echo "No task number or Jira key found in branch: $BRANCH"
            echo "task_number=" >> "$GITHUB_OUTPUT"
            echo "jira_key=" >> "$GITHUB_OUTPUT"
            echo "source=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Build task content
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SOURCE: ${{ steps.extract.outputs.source }}
          TASK_NUM: ${{ steps.extract.outputs.task_number }}
          JIRA_KEY: ${{ steps.extract.outputs.jira_key }}
          PR_NUM: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref }}
        run: bash .github/scripts/build-task-content.sh

      - name: Update PR description
        if: steps.build.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          gh pr view "$PR_NUM" --json body --jq '.body' > /tmp/current_body.md

          python3 -c "
          with open('/tmp/current_body.md', 'r') as f:
              body = f.read()
          with open('/tmp/task_content.md', 'r') as f:
              replacement = f.read()
          placeholder = '<!-- TASK_PLACEHOLDER -->'
          if placeholder in body:
              body = body.replace(placeholder, replacement)
              with open('/tmp/new_body.md', 'w') as f:
                  f.write(body)
              print('Placeholder found and replaced')
          else:
              print('No TASK_PLACEHOLDER found in PR body (already enriched or missing), skipping')
          "

          if [ -f /tmp/new_body.md ]; then
            gh pr edit "$PR_NUM" --body-file /tmp/new_body.md
            echo "PR description enriched successfully"
          fi

  checkstyle:
    name: Checkstyle
    needs: enrich-description
    if: >-
      always() &&
      needs.enrich-description.result != 'failure' &&
      (github.event.action != 'labeled' || github.event.label.name == 'rerun')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: ./.github/actions/setup-java-maven

      - name: Check formatting (Spotless)
        run: ./mvnw spotless:check

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

  test:
    name: Unit Tests
    needs: checkstyle
    if: always() && needs.checkstyle.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: ./.github/actions/setup-java-maven

      - name: Run Tests
        run: ./mvnw test

  claude-review:
    name: Claude Code Review
    needs: test
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: claude_review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a Senior Java Developer reviewing this Pull Request.

            ## Safety Constraints
            - Do NOT modify any source files
            - Do NOT create or write any files
            - Do NOT run build, test, or formatting commands
            - Do NOT push or commit changes

            ## Token Budget Rules
            - Use `gh pr diff` as your PRIMARY source of changes
            - Use `Read` for file contents — NEVER use `gh api` to read files
            - Max 5 extra file reads beyond diff (skill reference reads don't count)
            - Use `Grep`/`Glob` for targeted lookups instead of full file reads
            - Do NOT read unrelated files (README, wiki/, build configs not in the diff)

            ## Context Gathering (do this first, in order)
            1. `gh pr view ${{ github.event.pull_request.number }}` — PR description and task context
            2. `gh pr diff ${{ github.event.pull_request.number }}` — full diff
            3. Read CLAUDE.md for review rules
            4. `Read` specific files only if diff alone is insufficient

            ## Specialized Review Skills
            IF diff contains `*.java` files under `src/main/java/` or `src/test/java/`:
            - Invoke `/spring-java-reviewer` skill with the changed Java file paths
            - Use Critical/Warning findings for inline comments (Step 1 below)
            - Include the full skill report in the summary comment (Step 2 below)
            IF diff contains ONLY non-Java changes: skip the skill.

            ## Review Rules
            - Apply code review guidelines from CLAUDE.md (global + path-specific rules)
            - DO NOT comment on formatting (Checkstyle CI) or test failures (test CI)

            ## MANDATORY: Post Review Results (do NOT skip)

            YOUR TEXT OUTPUT IS INVISIBLE. No one can see it.
            You MUST execute these steps using tools — otherwise the review is lost:

            ### Step 1 — Post inline comments for each finding

            For each Critical or Warning finding, call:
              `mcp__github_inline_comment__create_inline_comment`
            Parameters: path (file path), body (finding text with suggestion),
            line (line number from NEW file version in the diff).

            Inline comment rules:
            - ONLY comment on lines from `gh pr diff` output (+ or - prefix)
            - Use line numbers from the NEW file (right side of diff)
            - NEVER use line numbers from `Read` tool output
            - If a finding relates to an unchanged line, include it in Step 2 instead

            ### Step 2 — Post summary comment

            After all inline comments are posted, call:
              `mcp__github_comment__update_claude_comment`
            Parameter: body (the full review summary in markdown).

            The summary must include: verdict (APPROVE/REQUEST_CHANGES/COMMENT),
            findings count, one-line summary per finding.
            If spring-java-reviewer was used, append the full skill report as appendix.

            ### FINAL REMINDER
            Text output is invisible. ONLY tool calls in Step 1 and Step 2
            produce visible results on the PR. Do NOT skip these steps.
          show_full_output: true
          claude_args: |
            --max-turns 35
            --allowedTools "Glob,Grep,Read,Skill,mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"

      - name: Review Status
        if: always() && steps.claude_review.outcome == 'failure'
        run: |
          echo "## Claude Code Review — Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Review could not run (likely workflow validation mismatch)." >> "$GITHUB_STEP_SUMMARY"
          echo "> This is expected when \`ci.yml\` differs between the PR branch and master." >> "$GITHUB_STEP_SUMMARY"

      - name: Post Review (fallback)
        if: always() && steps.claude_review.outcome == 'success' && steps.claude_review.outputs.execution_file
        env:
          GH_TOKEN: ${{ github.token }}
          EXEC_FILE: ${{ steps.claude_review.outputs.execution_file }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/post-review-fallback.sh

      - name: Token Usage Summary
        if: always() && steps.claude_review.outputs.execution_file
        env:
          GH_TOKEN: ${{ github.token }}
          EXEC_FILE: ${{ steps.claude_review.outputs.execution_file }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f "$EXEC_FILE" ]; then
            echo "⚠️ Execution file not found, skipping token usage summary"
            exit 0
          fi

          METRICS=$(jq '
            # Sum token usage from all assistant messages
            [.[] | select(.type == "assistant") | .message.usage // empty] as $usages |
            ($usages | map(.input_tokens // 0) | add // 0) as $input |
            ($usages | map(.output_tokens // 0) | add // 0) as $output |
            ($usages | map(.cache_creation_input_tokens // 0) | add // 0) as $cache_create |
            ($usages | map(.cache_read_input_tokens // 0) | add // 0) as $cache_read |
            # Get result summary from last element
            (.[-1] | select(.type == "result")) as $result |
            {
              input_tokens: $input,
              output_tokens: $output,
              cache_creation_tokens: $cache_create,
              cache_read_tokens: $cache_read,
              num_turns: ($result.num_turns // 0),
              duration_ms: ($result.duration_ms // 0),
              total_cost_usd: ($result.total_cost_usd // 0)
            }
          ' "$EXEC_FILE")

          if [ -z "$METRICS" ] || [ "$METRICS" = "null" ]; then
            echo "⚠️ Could not parse token metrics from execution file"
            exit 0
          fi

          INPUT=$(echo "$METRICS" | jq -r '.input_tokens')
          OUTPUT=$(echo "$METRICS" | jq -r '.output_tokens')
          CACHE_CREATE=$(echo "$METRICS" | jq -r '.cache_creation_tokens')
          CACHE_READ=$(echo "$METRICS" | jq -r '.cache_read_tokens')
          TURNS=$(echo "$METRICS" | jq -r '.num_turns')
          DURATION_MS=$(echo "$METRICS" | jq -r '.duration_ms')
          COST=$(echo "$METRICS" | jq -r '.total_cost_usd')

          format_tokens() {
            local val=$1
            if [ "$val" -ge 1000000 ]; then
              printf "%.2fM" "$(echo "scale=2; $val / 1000000" | bc)"
            elif [ "$val" -ge 1000 ]; then
              printf "%.2fk" "$(echo "scale=2; $val / 1000" | bc)"
            else
              echo "$val"
            fi
          }

          DURATION_SEC=$((DURATION_MS / 1000))
          DURATION_FMT="$((DURATION_SEC / 60))m $((DURATION_SEC % 60))s"

          {
            echo "## Claude Code Review — Token Usage"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Input tokens | $(format_tokens "$INPUT") |"
            echo "| Output tokens | $(format_tokens "$OUTPUT") |"
            echo "| Cache creation | $(format_tokens "$CACHE_CREATE") |"
            echo "| Cache read | $(format_tokens "$CACHE_READ") |"
            echo "| Turns | $TURNS |"
            echo "| Duration | $DURATION_FMT |"
            printf "| Est. cost | \$%.2f |\n" "$COST"
          } | tee /tmp/token_table.md >> "$GITHUB_STEP_SUMMARY"

          LATEST_CLAUDE=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]")] | last // empty')

          if [ -n "$LATEST_CLAUDE" ]; then
            COMMENT_ID=$(echo "$LATEST_CLAUDE" | jq -r '.id')
            EXISTING_BODY=$(echo "$LATEST_CLAUDE" | jq -r '.body')
            {
              echo "$EXISTING_BODY"
              echo ""
              echo "---"
              echo ""
              cat /tmp/token_table.md
            } > /tmp/claude_with_tokens.md
            python3 -c 'import json; body=open("/tmp/claude_with_tokens.md").read(); json.dump({"body": body}, open("/tmp/token_patch.json", "w"))'
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH --input /tmp/token_patch.json --silent \
              && echo "Token table appended to Claude comment $COMMENT_ID" \
              || { echo "Warning: patch failed, posting separate comment"; gh pr comment "$PR_NUM" --body-file /tmp/token_table.md; }
          else
            FALLBACK_REVIEW=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
              --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body != "")] | last // empty')
            if [ -n "$FALLBACK_REVIEW" ]; then
              REVIEW_ID=$(echo "$FALLBACK_REVIEW" | jq -r '.id')
              EXISTING_BODY=$(echo "$FALLBACK_REVIEW" | jq -r '.body')
              {
                echo "$EXISTING_BODY"
                echo ""
                echo "---"
                echo ""
                cat /tmp/token_table.md
              } > /tmp/review_with_tokens.md
              python3 -c 'import json; body=open("/tmp/review_with_tokens.md").read(); json.dump({"body": body}, open("/tmp/review_patch.json", "w"))'
              gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews/$REVIEW_ID" \
                -X PUT --input /tmp/review_patch.json --silent \
                && echo "Token table appended to fallback PR review $REVIEW_ID" \
                || { echo "Warning: review patch failed, posting separate comment"; gh pr comment "$PR_NUM" --body-file /tmp/token_table.md; }
            else
              echo "No Claude comment or fallback review found, posting token table as separate comment"
              gh pr comment "$PR_NUM" --body-file /tmp/token_table.md
            fi
          fi

          mkdir -p reports
          echo "$METRICS" | jq --argjson pr "$PR_NUM" '. + {pr: $pr}' \
            > "reports/pr-${PR_NUM}-usage.json"

          echo "✅ Token usage summary written to Step Summary, Claude comment, and reports/pr-${PR_NUM}-usage.json"

      - name: Minimize Outdated Reviews
        if: always() && steps.claude_review.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          GQL='mutation($id:ID!){minimizeComment(input:{subjectId:$id,classifier:OUTDATED}){minimizedComment{isMinimized}}}'

          ALL_CLAUDE=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]") | {id: .id, node_id: .node_id}]')

          COUNT=$(echo "$ALL_CLAUDE" | jq 'length')
          if [ "$COUNT" -gt 1 ]; then
            echo "Found $COUNT Claude comments — minimizing $((COUNT-1)) outdated one(s)"
            echo "$ALL_CLAUDE" | jq -r '.[:-1][].node_id' | while read -r NODE_ID; do
              gh api graphql -f query="$GQL" -f id="$NODE_ID" --silent \
                && echo "Minimized $NODE_ID" \
                || echo "Warning: could not minimize $NODE_ID"
            done
          else
            echo "Only $COUNT Claude comment(s), nothing to minimize"
          fi

          STALE_TOKEN_COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | startswith("## Claude Code Review — Token Usage")) | .node_id]')

          STALE_COUNT=$(echo "$STALE_TOKEN_COMMENTS" | jq 'length')
          if [ "$STALE_COUNT" -gt 0 ]; then
            echo "Found $STALE_COUNT standalone token table comment(s) to minimize"
            echo "$STALE_TOKEN_COMMENTS" | jq -r '.[]' | while read -r NODE_ID; do
              gh api graphql -f query="$GQL" -f id="$NODE_ID" --silent \
                && echo "Minimized token comment $NODE_ID" \
                || echo "Warning: could not minimize token comment $NODE_ID"
            done
          fi

      - name: Upload usage metrics
        if: always() && (hashFiles('reports/**') != '')
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-usage-pr-${{ github.event.pull_request.number }}
          path: reports/**

  cleanup-label:
    name: Remove rerun label
    needs: [enrich-description, checkstyle, test, claude-review]
    if: always() && github.event.action == 'labeled' && github.event.label.name == 'rerun'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Remove rerun label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --remove-label "rerun" \
            --repo "${{ github.repository }}"
          echo "Removed 'rerun' label from PR #${{ github.event.pull_request.number }}"
