name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]

jobs:
  enrich-description:
    name: Enrich PR Description
    if: >-
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && github.event.label.name == 'rerun')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract task number from branch name
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ task-([0-9]+) ]]; then
            echo "task_number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Found task number: ${BASH_REMATCH[1]} in branch: $BRANCH"
          else
            echo "No task number found in branch: $BRANCH"
            echo "task_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build task content
        id: build
        run: |
          TASK_NUM="${{ steps.extract.outputs.task_number }}"
          BRANCH="${{ github.head_ref }}"

          if [ -z "$TASK_NUM" ]; then
            cat > /tmp/task_content.md <<EOF
          > **Warning:** No task number detected in branch name \`${BRANCH}\`.
          > Expected format: \`feat/task-{N}-description\` or \`chore/task-{N}-description\`.
          > Fill in the Task Reference section manually if needed.
          EOF
            echo "has_content=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TASKS_FILE="./ai/tasks.md"

          if [ ! -f "$TASKS_FILE" ]; then
            cat > /tmp/task_content.md <<EOF
          > **Warning:** \`ai/tasks.md\` not found. Cannot auto-populate task reference.
          EOF
            echo "has_content=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SECTION=$(awk '
            /^### Task '"$TASK_NUM"':/ { found=1; next }
            found && /^### Task [0-9]+:/ { found=0 }
            found && /^---$/ { found=0 }
            found && /^## / { found=0 }
            found { print }
          ' "$TASKS_FILE")

          if [ -z "$SECTION" ]; then
            cat > /tmp/task_content.md <<EOF
          > **Warning:** Task $TASK_NUM not found in \`ai/tasks.md\`.
          EOF
            echo "has_content=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TITLE=$(grep -oP "^### Task ${TASK_NUM}: \K.*" "$TASKS_FILE" | sed 's/ ✅ COMPLETED//')

          DESCRIPTION=$(echo "$SECTION" | awk '/^\*\*Description:\*\*/{flag=1; sub(/\*\*Description:\*\* */,""); print; next} flag && /^\*\*/{flag=0} flag{print}')

          SCOPE=$(echo "$SECTION" | awk '/^\*\*Scope:\*\*/{flag=1; next} flag && /^- /{print} flag && !/^- / && !/^$/{flag=0}')

          REVIEW_RULES=$(echo "$SECTION" | grep -oP '^\*\*Claude review:\*\* \K.*' || true)

          EXPECTED=$(echo "$SECTION" | awk '/^\*\*Expected review points:\*\*/{flag=1; next} flag && /^- \[/{print} flag && !/^- \[/ && !/^$/{flag=0}')

          {
            echo "### Task ${TASK_NUM}: ${TITLE}"
            echo ""
            if [ -n "$DESCRIPTION" ]; then
              echo "**Description:** ${DESCRIPTION}"
              echo ""
            fi
            if [ -n "$SCOPE" ]; then
              echo "**Scope:**"
              echo "${SCOPE}"
              echo ""
            fi
            if [ -n "$REVIEW_RULES" ]; then
              echo "**Claude review:** ${REVIEW_RULES}"
              echo ""
            fi
            if [ -n "$EXPECTED" ]; then
              echo "**Expected review points:**"
              echo "${EXPECTED}"
            fi
          } > /tmp/task_content.md

          echo "has_content=true" >> "$GITHUB_OUTPUT"

      - name: Update PR description
        if: steps.build.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          gh pr view "$PR_NUM" --json body --jq '.body' > /tmp/current_body.md

          python3 -c "
          with open('/tmp/current_body.md', 'r') as f:
              body = f.read()
          with open('/tmp/task_content.md', 'r') as f:
              replacement = f.read()
          placeholder = '<!-- TASK_PLACEHOLDER -->'
          if placeholder in body:
              body = body.replace(placeholder, replacement)
              with open('/tmp/new_body.md', 'w') as f:
                  f.write(body)
              print('Placeholder found and replaced')
          else:
              print('No TASK_PLACEHOLDER found in PR body (already enriched or missing), skipping')
          "

          if [ -f /tmp/new_body.md ]; then
            gh pr edit "$PR_NUM" --body-file /tmp/new_body.md
            echo "PR description enriched successfully"
          fi

  checkstyle:
    name: Checkstyle
    needs: enrich-description
    if: >-
      always() &&
      needs.enrich-description.result != 'failure' &&
      (github.event.action != 'labeled' || github.event.label.name == 'rerun')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting (Spotless)
        run: ./mvnw spotless:check

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

  test:
    name: Unit Tests
    needs: checkstyle
    if: always() && needs.checkstyle.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: ./mvnw test

  claude-review:
    name: Claude Code Review
    needs: test
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a Senior Java Developer reviewing this Pull Request.

            ## Token Budget Rules
            - Use `gh pr diff` as your PRIMARY source of changes
            - Use `Read` tool for file contents — NEVER use `gh api` to read files
            - Use `Write` tool to create report files — it auto-creates directories, no `mkdir` needed
            - You MAY read related files (interfaces, parent classes, callers, test counterparts)
              when needed to verify correctness — keep it targeted (max 5 extra file reads)
            - Use `Grep`/`Glob` to find related code (e.g., who calls a changed method, where
              an interface is implemented) — this is cheaper than reading full files
            - Do NOT read unrelated files (README, wiki/, build configs not in the diff)

            ## Context Gathering (do this first, in order)
            1. Run `gh pr view ${{ github.event.pull_request.number }}` to read PR description
               and task context
            2. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff
            3. Read CLAUDE.md for review rules (this file is always relevant)
            4. Only then use `Read` for specific files if the diff alone is insufficient

            ## Review Rules
            - Apply code review guidelines from CLAUDE.md (global + path-specific rules)
            - DO NOT comment on formatting issues (handled by Checkstyle CI job)
            - DO NOT comment on test failures (handled by test CI job)

            ## Review Workflow
            1. INLINE REVIEW: Post inline comments for specific code issues found in the diff
            2. STRUCTURED REPORT: Write a markdown report to
               reports/pr-${{ github.event.pull_request.number }}-review.md with:
               - Execution Plan (what you checked and why)
               - Summary and Strengths
               - Risks / Potential Bugs
               - Path-Specific Rule Compliance (only for affected paths)
               - Suggested patches as unified diffs (if applicable)
               - Next Actions for the author
            3. STICKY COMMENT: After completing inline review and report, update the
               PR sticky comment with a concise review summary using the
               `mcp__github_comment__update_claude_comment` tool. Include:
               verdict (approve/request changes), key findings count,
               and a one-line summary per finding.
               Also write the same summary to
               reports/pr-${{ github.event.pull_request.number }}-comment.md
               (for artifact archival)

            ## Inline Comment Rules
            - ONLY comment on lines that appear in `gh pr diff` output (lines with + or - prefix)
            - Use line numbers from the NEW file version (right side of the diff)
            - NEVER use line numbers obtained from `Read` tool — they may differ from diff context
            - If a finding relates to an unchanged line, mention it in the report instead

            ## Safety
            - Do NOT modify any source files — only write reports under reports/
            - Do NOT run build, test, or formatting commands
            - Do NOT push or commit changes
            - Use `mcp__github_comment__update_claude_comment` to post the review summary
              as a sticky comment — this is the ONLY way to update the PR comment
          claude_args: |
            --max-turns 30
            --allowedTools "Glob,Grep,Read,mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Write"

      - name: Token Usage Summary
        if: always() && steps.claude_review.outputs.execution_file
        env:
          EXEC_FILE: ${{ steps.claude_review.outputs.execution_file }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f "$EXEC_FILE" ]; then
            echo "⚠️ Execution file not found, skipping token usage summary"
            exit 0
          fi

          METRICS=$(jq '
            # Sum token usage from all assistant messages
            [.[] | select(.type == "assistant") | .message.usage // empty] as $usages |
            ($usages | map(.input_tokens // 0) | add // 0) as $input |
            ($usages | map(.output_tokens // 0) | add // 0) as $output |
            ($usages | map(.cache_creation_input_tokens // 0) | add // 0) as $cache_create |
            ($usages | map(.cache_read_input_tokens // 0) | add // 0) as $cache_read |
            # Get result summary from last element
            (.[-1] | select(.type == "result")) as $result |
            {
              input_tokens: $input,
              output_tokens: $output,
              cache_creation_tokens: $cache_create,
              cache_read_tokens: $cache_read,
              num_turns: ($result.num_turns // 0),
              duration_ms: ($result.duration_ms // 0),
              total_cost_usd: ($result.total_cost_usd // 0)
            }
          ' "$EXEC_FILE")

          if [ -z "$METRICS" ] || [ "$METRICS" = "null" ]; then
            echo "⚠️ Could not parse token metrics from execution file"
            exit 0
          fi

          INPUT=$(echo "$METRICS" | jq -r '.input_tokens')
          OUTPUT=$(echo "$METRICS" | jq -r '.output_tokens')
          CACHE_CREATE=$(echo "$METRICS" | jq -r '.cache_creation_tokens')
          CACHE_READ=$(echo "$METRICS" | jq -r '.cache_read_tokens')
          TURNS=$(echo "$METRICS" | jq -r '.num_turns')
          DURATION_MS=$(echo "$METRICS" | jq -r '.duration_ms')
          COST=$(echo "$METRICS" | jq -r '.total_cost_usd')

          format_tokens() {
            local val=$1
            if [ "$val" -ge 1000000 ]; then
              printf "%.2fM" "$(echo "scale=2; $val / 1000000" | bc)"
            elif [ "$val" -ge 1000 ]; then
              printf "%.2fk" "$(echo "scale=2; $val / 1000" | bc)"
            else
              echo "$val"
            fi
          }

          DURATION_SEC=$((DURATION_MS / 1000))
          DURATION_FMT="$((DURATION_SEC / 60))m $((DURATION_SEC % 60))s"

          {
            echo "## Claude Code Review — Token Usage"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Input tokens | $(format_tokens "$INPUT") |"
            echo "| Output tokens | $(format_tokens "$OUTPUT") |"
            echo "| Cache creation | $(format_tokens "$CACHE_CREATE") |"
            echo "| Cache read | $(format_tokens "$CACHE_READ") |"
            echo "| Turns | $TURNS |"
            echo "| Duration | $DURATION_FMT |"
            printf "| Est. cost | \$%.2f |\n" "$COST"
          } >> "$GITHUB_STEP_SUMMARY"

          mkdir -p reports
          echo "$METRICS" | jq --argjson pr "$PR_NUM" '. + {pr: $pr}' \
            > "reports/pr-${PR_NUM}-usage.json"

          echo "✅ Token usage summary written to Step Summary and reports/pr-${PR_NUM}-usage.json"

      - name: Upload review report
        if: always() && (hashFiles('reports/**') != '')
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-report-pr-${{ github.event.pull_request.number }}
          path: reports/**

  cleanup-label:
    name: Remove rerun label
    needs: [enrich-description, checkstyle, test, claude-review]
    if: always() && github.event.action == 'labeled' && github.event.label.name == 'rerun'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove rerun label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --remove-label "rerun" \
            --repo "${{ github.repository }}"
          echo "Removed 'rerun' label from PR #${{ github.event.pull_request.number }}"
