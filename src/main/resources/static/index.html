<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css">
  <style>
    .result-header { margin-bottom: 0; }
    .merchant { margin: 0.5rem 0 1rem; color: var(--pico-muted-color); }
    .summary { display: flex; justify-content: space-between; align-items: baseline; margin-top: 1rem; }
    .total { font-size: 1.25rem; font-weight: 700; }
    .tags { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--pico-muted-color); }
    table td:nth-child(2), table td:nth-child(3), table td:nth-child(4),
    table th:nth-child(2), table th:nth-child(3), table th:nth-child(4) { text-align: right; }
    #error[hidden], #result[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="container">
    <hgroup>
      <h1>Bill Manager</h1>
      <p>Upload a bill or receipt (JPEG, PNG, or PDF) for automated analysis.</p>
    </hgroup>

    <form id="uploadForm">
      <fieldset role="group">
        <input type="file" id="fileInput" name="file" accept="image/jpeg,image/png,application/pdf" required>
        <button type="submit" id="submitBtn">Analyze</button>
      </fieldset>
    </form>

    <div id="error" role="alert" hidden></div>
    <div id="result" hidden></div>
  </main>

  <script>
    const form = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');

    function formatNumber(value) {
      return Number(value).toFixed(2);
    }

    function formatTimestamp(iso) {
      const d = new Date(iso);
      return d.toLocaleString();
    }

    function renderResult(data) {
      const a = data.analysis;
      const itemsHtml = a.items.map(function(item) {
        return '<tr>'
          + '<td>' + escapeHtml(item.name) + '</td>'
          + '<td>' + formatNumber(item.quantity) + '</td>'
          + '<td>' + formatNumber(item.unitPrice) + '</td>'
          + '<td>' + formatNumber(item.totalPrice) + '</td>'
          + '</tr>';
      }).join('');

      const tagsHtml = (a.categoryTags && a.categoryTags.length)
        ? '<div class="tags">' + a.categoryTags.map(function(t) { return '<kbd>' + escapeHtml(t) + '</kbd>'; }).join('') + '</div>'
        : '';

      return '<article>'
        + '<header>'
        + '<h3 class="result-header">' + escapeHtml(data.originalFileName) + '</h3>'
        + '<p class="merchant">' + escapeHtml(a.merchantName) + '</p>'
        + '</header>'
        + '<table>'
        + '<thead><tr><th>Item</th><th>Qty</th><th>Unit price</th><th>Total</th></tr></thead>'
        + '<tbody>' + itemsHtml + '</tbody>'
        + '</table>'
        + '<div class="summary">'
        + '<span class="total">Total: ' + formatNumber(a.totalAmount) + ' ' + escapeHtml(a.currency) + '</span>'
        + tagsHtml
        + '</div>'
        + '<footer class="meta">'
        + '<span>ID: ' + data.id.substring(0, 8) + '&hellip;</span>'
        + '<span>' + formatTimestamp(data.analyzedAt) + '</span>'
        + '</footer>'
        + '</article>';
    }

    function renderError(status, data) {
      return '<article>'
        + '<header><strong>Error ' + status + '</strong></header>'
        + '<p>' + escapeHtml(data.code || 'UNKNOWN') + ': ' + escapeHtml(data.message || 'An unexpected error occurred.') + '</p>'
        + '</article>';
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) return;

      errorEl.hidden = true;
      resultEl.hidden = true;
      submitBtn.setAttribute('aria-busy', 'true');
      submitBtn.textContent = 'Analyzing\u2026';
      submitBtn.disabled = true;

      var formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        var response = await fetch('/api/bills/upload', { method: 'POST', body: formData });
        var data = await response.json();
        if (!response.ok) {
          errorEl.innerHTML = renderError(response.status, data);
          errorEl.hidden = false;
        } else {
          resultEl.innerHTML = renderResult(data);
          resultEl.hidden = false;
        }
      } catch (err) {
        errorEl.innerHTML = renderError(0, { code: 'NETWORK_ERROR', message: err.message });
        errorEl.hidden = false;
      } finally {
        submitBtn.removeAttribute('aria-busy');
        submitBtn.textContent = 'Analyze';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
